name: HealthSync
options:
  bundleIdPrefix: io.vulturelabs
  createIntermediateGroups: true
  developmentLanguage: en
  generateEmptyDirectories: false
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: NO
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: "0.1.0"
    CODE_SIGN_STYLE: Automatic
    # Apple Developer Team ID. Kept here so `xcodegen generate` produces a
    # pbxproj consistent with what Xcode's automatic signing writes locally
    # — without it, regeneration silently strips DEVELOPMENT_TEAM and the
    # next build asks for signing setup again.
    DEVELOPMENT_TEAM: "W83KWX4GJ6"

packages:
  Pilot:
    path: ../pilot-swift

targets:

  HealthSync:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HealthSync
        excludes:
          - "Info.plist"
          - "HealthSync.entitlements"
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.vulturelabs.healthsyncs
        INFOPLIST_FILE: HealthSync/Info.plist
        CODE_SIGN_ENTITLEMENTS: HealthSync/HealthSync.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: HealthSyncWidget
        embed: true
      - package: Pilot
        product: Pilot

  HealthSyncWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HealthSyncWidget
        excludes:
          - "Info.plist"
          - "HealthSyncWidget.entitlements"
      - path: Shared/WidgetSnapshot.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.vulturelabs.healthsyncs.widget
        INFOPLIST_FILE: HealthSyncWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: HealthSyncWidget/HealthSyncWidget.entitlements
        SKIP_INSTALL: YES

schemes:
  HealthSync:
    build:
      targets:
        HealthSync: all
    run:
      config: Debug
    archive:
      config: Release
