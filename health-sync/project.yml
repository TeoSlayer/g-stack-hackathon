name: HealthSync
options:
  bundleIdPrefix: io.vulturelabs
  createIntermediateGroups: true
  developmentLanguage: en
  generateEmptyDirectories: false
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: NO
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: "0.1.0"
    CODE_SIGN_STYLE: Automatic
    # Set your Apple Developer Team ID here, or leave blank and pick it in Xcode.
    DEVELOPMENT_TEAM: ""

targets:

  HealthSync:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HealthSync
        excludes:
          - "Info.plist"
          - "HealthSync.entitlements"
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.vulturelabs.healthsyncs
        INFOPLIST_FILE: HealthSync/Info.plist
        CODE_SIGN_ENTITLEMENTS: HealthSync/HealthSync.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: HealthSyncWatch
        embed: true
      - target: HealthSyncWidget
        embed: true

  HealthSyncWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HealthSyncWidget
        excludes:
          - "Info.plist"
          - "HealthSyncWidget.entitlements"
      - path: Shared/WidgetSnapshot.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.vulturelabs.healthsyncs.widget
        INFOPLIST_FILE: HealthSyncWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: HealthSyncWidget/HealthSyncWidget.entitlements
        SKIP_INSTALL: YES

  HealthSyncWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: HealthSyncWatch
        excludes:
          - "Info.plist"
          - "HealthSyncWatch.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.vulturelabs.healthsyncs.watchkitapp
        INFOPLIST_FILE: HealthSyncWatch/Info.plist
        CODE_SIGN_ENTITLEMENTS: HealthSyncWatch/HealthSyncWatch.entitlements
        TARGETED_DEVICE_FAMILY: "4"
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

schemes:
  HealthSync:
    build:
      targets:
        HealthSync: all
        HealthSyncWatch: all
    run:
      config: Debug
    archive:
      config: Release
  HealthSyncWatch:
    build:
      targets:
        HealthSyncWatch: all
    run:
      config: Debug
